name: ibkr-client-portal-docker

services:
  ibkr-client-portal:
    build:
      context: .
      args:
        GATEWAY_ZIP_URL: ${IBKR_GATEWAY_ZIP_URL:-https://download2.interactivebrokers.com/portal/clientportal.beta.gw.zip}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
    container_name: ibkr-client-portal
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      no_proxy: ${no_proxy:-}
    ports:
      - "127.0.0.1:5000:5000"
      - "[::1]:5000:5000"

# Login URL:
#   https://localhost:5000/
#
# Read-only smoke endpoints after login:
#   https://localhost:5000/v1/api/sso/validate
#   https://localhost:5000/v1/api/tickle
