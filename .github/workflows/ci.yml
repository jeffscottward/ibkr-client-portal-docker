name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "23 10 * * 1"
  workflow_dispatch:

jobs:
  test:
    name: Python tests and static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run pytest
      - run: bash -n start.sh
      - run: docker compose config --quiet

  gateway-build:
    name: Gateway image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
